<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#006a4e" />
  <title>Spaces@LBG</title>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <!-- QR code library (used on Profile page for browser → phone install link) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <!-- App shell -->
  <header class="app-bar" id="appBar">
    <div class="app-bar__brand">
      <span class="logo-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 12 L12 4 L21 12 V20 H14 V14 H10 V20 H3 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <circle cx="17" cy="8" r="1.6" fill="currentColor"/>
        </svg>
      </span>
      <h1 class="app-bar__title">Spaces<span class="at">@</span>LBG</h1>
    </div>
    <div class="app-bar__actions">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
      <button class="avatar-btn" id="avatarBtn" aria-label="Profile">
        <span class="avatar" id="avatarInitials">--</span>
      </button>
    </div>
  </header>

  <main class="app-main" id="appMain">
    <!-- Views are mounted here by the router -->
  </main>

  <nav class="bottom-nav" id="bottomNav" aria-label="Primary">
    <a href="#/" data-route="/" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 L12 4 L21 12"/><path d="M5 10v10h14V10"/></svg>
      <span>Home</span>
    </a>
    <a href="#/book" data-route="/book" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M8 3v4M16 3v4M3 11h18"/></svg>
      <span>Book</span>
    </a>
    <a href="#/bookings" data-route="/bookings" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>My Bookings</span>
    </a>
    <a href="#/team" data-route="/team" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>My Team</span>
    </a>
    <a href="#/profile" data-route="/profile" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <!-- Global modal + toast hosts -->
  <div id="modalRoot" aria-live="polite"></div>
  <div id="toastRoot" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
